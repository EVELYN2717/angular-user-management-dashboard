<h2>Users</h2>

<button mat-raised-button color="primary" routerLink="/create">
  Add User
</button>

<div *ngIf="loading" class="loader">
  <mat-spinner></mat-spinner>
</div>

<table mat-table [dataSource]="users" *ngIf="!loading">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let user"> {{ user.name }} </td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef> Email </th>
    <td mat-cell *matCellDef="let user"> {{ user.email }} </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let user">
      <button mat-raised-button color="warn" (click)="deleteUser(user.id)">
        Delete
      </button>
      <button mat-raised-button color="primary" [routerLink]="['/edit', user.id]">
        Edit
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="['name','email','actions']"></tr>
  <tr mat-row *matRowDef="let row; columns: ['name','email','actions'];"></tr>

</table>
